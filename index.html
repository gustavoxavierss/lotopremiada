    /* BACK-REDIRECT MAIS ROBUSTO (MOBILE & DESKTOP) */
    (function () {
      var url_redirect = "https://descontoativo.vercel.app/" + location.search;

      function armTrap() {
        try {
          history.pushState({ trapped: true }, "", location.href);
        } catch (e) {
          // alguns webviews/browsers podem bloquear em cenários específicos
        }
      }

      function goAway() {
        location.replace(url_redirect);
      }

      // arma na carga
      armTrap();

      // quando tenta voltar
      window.addEventListener("popstate", function () {
        goAway();
      });

      // MUITO importante: quando volta do bfcache (comum no iOS)
      window.addEventListener("pageshow", function () {
        armTrap();
      });

      // reforço quando volta a ficar visível
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "visible") armTrap();
      });

      // reforço após primeira interação (caso o navegador exija)
      function firstInteract() { armTrap(); }
      window.addEventListener("touchstart", firstInteract, { once: true, passive: true });
      window.addEventListener("click", firstInteract, { once: true });
    })();
